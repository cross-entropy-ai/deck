name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Release ${{ github.ref_name }} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.exists != 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        run: |
          BIN=deck
          ARCHIVE="${BIN}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/${BIN}" "${ARCHIVE}/"
          cp README.md "${ARCHIVE}/"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: deck-${{ matrix.target }}
          path: "*.tar.gz"

  release:
    needs: [check, build]
    if: needs.check.outputs.exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tar.gz"

  homebrew:
    needs: [check, release]
    if: needs.check.outputs.exists != 'true'
    runs-on: ubuntu-latest
    env:
      TAP_REPO: cross-entropy-ai/homebrew-tap
      PACKAGE_NAME: deck
      REPO_SLUG: cross-entropy-ai/deck
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        run: |
          echo "aarch64_darwin=$(sha256sum deck-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_darwin=$(sha256sum deck-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(sha256sum deck-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "aarch64_linux=$(sha256sum deck-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          SHA_AARCH64_DARWIN: ${{ steps.sha.outputs.aarch64_darwin }}
          SHA_X86_64_DARWIN: ${{ steps.sha.outputs.x86_64_darwin }}
          SHA_X86_64_LINUX: ${{ steps.sha.outputs.x86_64_linux }}
          SHA_AARCH64_LINUX: ${{ steps.sha.outputs.aarch64_linux }}
        run: |
          FORMULA_VERSION="${VERSION#v}"
          BASE_URL="https://github.com/${REPO_SLUG}/releases/download/${VERSION}"

          cat > deck.rb << FORMULA
          class Deck < Formula
            desc "Terminal sidebar for browsing and switching tmux sessions"
            homepage "https://github.com/${REPO_SLUG}"
            version "${FORMULA_VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/deck-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_DARWIN}"
              else
                url "${BASE_URL}/deck-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_DARWIN}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/deck-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              else
                url "${BASE_URL}/deck-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            depends_on "tmux"

            def install
              bin.install "deck"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/deck --version")
            end
          end
          FORMULA

          git config --global --unset-all credential.helper || true
          git config --system --unset-all credential.helper 2>/dev/null || true
          git config --global credential.helper ""
          git config --global --unset-all "http.https://github.com/.extraheader" || true

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp deck.rb tap/Formula/deck.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/deck.rb
          git commit -m "deck ${VERSION}"
          git push
